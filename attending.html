<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Your Attending DP | TFCN 2026: The Old Taker</title>
<meta name="description" content="Attending TFCN 2026? Upload your photo, enter your name, and download your personalised attending graphic for The Old Taker. Share it everywhere.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://thefinancecyclenetwork.com/attending.html">
<meta property="og:type" content="website">
<meta property="og:url" content="https://thefinancecyclenetwork.com/attending.html">
<meta property="og:title" content="Get Your Attending DP | TFCN 2026">
<meta property="og:description" content="Attending TFCN 2026? Create your personalised attending graphic in seconds.">
<meta property="og:image" content="https://thefinancecyclenetwork.com/tfcn-logo.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Get Your Attending DP | TFCN 2026">
<link rel="icon" type="image/svg+xml" href="tfcn-logo.svg">
<link rel="icon" type="image/png" href="tfcn-logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; margin: 0; background: #F5F2EE; }
  .serif { font-family: 'Instrument Serif', serif; }
  .grain::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4; mix-blend-mode: multiply;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes menuSlide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes menuLinkIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fadeUp { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
  .animate-slide-in { animation: slideIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
  .nav-link { position: relative; }
  .nav-link::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 0; height: 1.5px; background: #E05A1A; transition: width 0.35s cubic-bezier(0.16,1,0.3,1); }
  .nav-link:hover::after { width: 100%; }
  .menu-slide { animation: menuSlide 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
  .menu-link-in { animation: menuLinkIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
  .toast-anim { animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
  html { scroll-behavior: smooth; }
  canvas { display: block; }
  .upload-zone { transition: border-color 0.3s, background 0.3s; }
  .upload-zone:hover { border-color: #E05A1A !important; background: rgba(224,90,26,0.04) !important; }
  .upload-zone.drag-over { border-color: #E05A1A !important; background: rgba(224,90,26,0.08) !important; }
  .step-num { transition: background 0.3s; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ── icons ── */
function Icon({ name, size = 16, className = '', strokeWidth = 2 }) {
  const i = {
    arrow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>,
    menu:  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
    x:     <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    upload:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>,
    down:  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="8 17 12 21 16 17"/><line x1="12" y1="3" x2="12" y2="21"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
  };
  return i[name] || null;
}

/* ── logo ── */
function Logo({ size = 32 }) {
  return <img src="tfcn-logo.svg" width={size} height={size} alt="TFCN Logo" style={{ flexShrink: 0, objectFit: 'contain', display: 'block' }}/>;
}

/* ── mobile menu ── */
function MobileMenu({ onClose }) {
  const links = [['/', 'Home'], ['/#about', 'About'], ['/#host', 'Convener'], ['/#tickets', 'Tickets'], ['attending.html', 'Get Your DP'], ['/#faq', 'FAQ'], ['blog.html', 'Blog']];
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);
  return (
    <div className="menu-slide fixed inset-0 z-50 bg-[#0A0A0A] flex flex-col">
      <div className="flex items-center justify-between px-5 py-5 border-b border-white/10">
        <a href="/" className="text-white flex items-center gap-2.5"><Logo size={28}/></a>
        <button onClick={onClose} className="w-10 h-10 flex items-center justify-center text-white/70 hover:text-white transition-colors">
          <Icon name="x" size={22} strokeWidth={2}/>
        </button>
      </div>
      <nav className="flex-1 px-6 py-8 flex flex-col justify-center space-y-1">
        {links.map(([href, label], i) => (
          <a key={i} href={href} onClick={onClose}
            className="menu-link-in block text-4xl sm:text-5xl font-bold text-white/50 hover:text-white py-4 border-b border-white/10 transition-colors duration-300"
            style={{ animationDelay: `${0.05 + i * 0.07}s` }}>
            {label}
          </a>
        ))}
      </nav>
    </div>
  );
}

/* ── canvas constants (1080x1080) ── */
const CS     = 1080;
const PBOX   = { x: 152, y: 306, w: 334, h: 356 }; /* photo box — pixel-accurate */
const NBOX   = { x: 534, y: 372, w: 322, h: 65  }; /* name box  — pixel-accurate */

/* ── main app ── */
function App() {
  const [scrolled, setScrolled]       = useState(false);
  const [menuOpen, setMenuOpen]       = useState(false);
  const [photo, setPhoto]             = useState(null);   /* Image element */
  const [photoOffset, setPhotoOffset] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging]   = useState(false);
  const [dragStart, setDragStart]     = useState({ x: 0, y: 0 });
  const [name, setName]               = useState('');
  const [templateImg, setTemplateImg] = useState(null);
  const [downloaded, setDownloaded]   = useState(false);
  const [toast, setToast]             = useState('');
  const [dragOver, setDragOver]       = useState(false);
  const [fontsReady, setFontsReady]   = useState(false);

  const canvasRef   = useRef(null);
  const fileInputRef = useRef(null);
  const isTouch     = typeof window !== 'undefined' && 'ontouchstart' in window;

  /* scroll nav */
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  /* load template */
  useEffect(() => {
    const img = new Image();
    img.onload  = () => setTemplateImg(img);
    img.onerror = () => console.warn('Template image failed to load');
    img.src = 'assets/images/Attending.jpg';
  }, []);

  /* ensure Inter font loaded for canvas */
  useEffect(() => {
    if (document.fonts && document.fonts.load) {
      document.fonts.load('900 32px Inter').then(() => setFontsReady(true)).catch(() => setFontsReady(true));
    } else {
      setFontsReady(true);
    }
  }, []);

  /* ── draw canvas ── */
  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas || !templateImg) return;
    const ctx = canvas.getContext('2d');

    ctx.clearRect(0, 0, CS, CS);

    /* 1. template base */
    ctx.drawImage(templateImg, 0, 0, CS, CS);

    /* 2. user photo — cover-fit, face-top-biased, clipped to box */
    if (photo) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(PBOX.x, PBOX.y, PBOX.w, PBOX.h);
      ctx.clip();

      const sc = Math.max(PBOX.w / photo.naturalWidth, PBOX.h / photo.naturalHeight);
      const sw = photo.naturalWidth  * sc;
      const sh = photo.naturalHeight * sc;
      /* center horizontally; bias toward top vertically so faces show */
      const bx = PBOX.x + (PBOX.w - sw) / 2;
      const by = PBOX.y + (PBOX.h - sh) * 0.15;

      ctx.drawImage(photo, bx + photoOffset.x, by + photoOffset.y, sw, sh);
      ctx.restore();
    }

    /* 3. name text — auto-sizes to fill the white rectangle, centred */
    if (name.trim() && fontsReady) {
      const upper = name.toUpperCase();
      ctx.save();
      ctx.fillStyle    = '#1A1A1A';
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'left';

      const pad = 18;
      /* start at a size that fills the box height, shrink until it fits the width */
      let fs = Math.floor(NBOX.h * 0.68); /* ~44px */
      ctx.font = `900 ${fs}px Inter, Arial, sans-serif`;
      while (ctx.measureText(upper).width > NBOX.w - pad && fs > 10) {
        fs--;
        ctx.font = `900 ${fs}px Inter, Arial, sans-serif`;
      }
      /* centre the text horizontally within the box */
      const tw = ctx.measureText(upper).width;
      const tx = NBOX.x + (NBOX.w - tw) / 2;
      ctx.fillText(upper, tx, NBOX.y + NBOX.h / 2);
      ctx.restore();
    }
  }, [templateImg, photo, photoOffset, name, fontsReady]);

  useEffect(() => { draw(); }, [draw]);

  /* ── file handling ── */
  const handleFile = (file) => {
    if (!file) return;
    if (!file.type.match(/image\/(jpeg|png)/)) {
      showToast('Please upload a JPG or PNG image.');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      /* compress if over 5MB */
      const img = new Image();
      img.onload = () => {
        if (file.size > 5 * 1024 * 1024) {
          const tmp = document.createElement('canvas');
          const scale = Math.min(1, 2000 / Math.max(img.naturalWidth, img.naturalHeight));
          tmp.width  = img.naturalWidth  * scale;
          tmp.height = img.naturalHeight * scale;
          tmp.getContext('2d').drawImage(img, 0, 0, tmp.width, tmp.height);
          const compressed = new Image();
          compressed.onload = () => { setPhoto(compressed); setPhotoOffset({ x: 0, y: 0 }); setDownloaded(false); };
          compressed.src = tmp.toDataURL('image/jpeg', 0.85);
        } else {
          setPhoto(img);
          setPhotoOffset({ x: 0, y: 0 });
          setDownloaded(false);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  /* ── drag-to-reposition on canvas ── */
  const onCanvasMouseDown = (e) => {
    if (!photo || isTouch) return;
    setIsDragging(true);
    setDragStart({ x: e.clientX, y: e.clientY });
    e.preventDefault();
  };
  const onCanvasMouseMove = (e) => {
    if (!isDragging || !photo || isTouch) return;
    const canvas  = canvasRef.current;
    const scale   = CS / canvas.offsetWidth;
    const dx = (e.clientX - dragStart.x) * scale;
    const dy = (e.clientY - dragStart.y) * scale;
    setPhotoOffset(p => ({ x: p.x + dx, y: p.y + dy }));
    setDragStart({ x: e.clientX, y: e.clientY });
  };
  const onCanvasMouseUp = () => setIsDragging(false);

  /* ── toast helper ── */
  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(''), 4500);
  };

  /* ── download ── */
  const handleDownload = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = 'TFCN2026-AttendingDP.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setDownloaded(true);
    }, 'image/png');
  };

  /* ── copy to clipboard (Instagram) ── */
  const copyForInstagram = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        showToast('Image copied! Open Instagram and paste into your story or post.');
      } catch {
        /* fallback: download */
        handleDownload();
        showToast('Saved! Share your downloaded image on Instagram.');
      }
    }, 'image/png');
  };

  const shareTextWA = encodeURIComponent("I'm attending The Old Taker | TFCN 2026. Lagos, 23 July. thefinancecyclenetwork.com/attending");
  const shareTextX  = encodeURIComponent("I'm attending The Old Taker | TFCN 2026. Lagos, 23 July. @thefinancecycle thefinancecyclenetwork.com/attending");

  const canDownload = !!(photo && name.trim().length > 0 && templateImg);

  return (
    <div className="min-h-screen bg-[#F5F2EE] text-[#0A0A0A] grain">
      {menuOpen && <MobileMenu onClose={() => setMenuOpen(false)}/>}

      {/* NAV */}
      <nav className={`fixed top-0 inset-x-0 z-50 transition-all duration-500 ${scrolled ? 'bg-white/85 backdrop-blur-xl border-b border-black/10 py-3' : 'bg-white/70 backdrop-blur-md py-5'}`}>
        <div className="max-w-7xl mx-auto px-5 lg:px-10 flex items-center justify-between">
          <a href="/" className="flex items-center gap-2.5 text-[#0A0A0A]">
            <Logo size={30}/>
            <span className="text-[13px] font-bold tracking-tight hidden sm:block">The <span className="text-[#E05A1A]">Finance</span> Cycle Network</span>
          </a>
          <div className="flex items-center gap-1">
            <a href="/"          className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">Home</a>
            <a href="/#about"    className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">About</a>
            <a href="/#host"     className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">Convener</a>
            <a href="/#tickets"  className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">Tickets</a>
            <a href="attending.html" className="nav-link hidden md:block text-sm font-medium text-[#E05A1A] hover:text-[#0A0A0A] px-4 py-2 transition">Get Your DP</a>
            <a href="/#faq"      className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">FAQ</a>
            <a href="blog.html"  className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">Blog</a>
            <a href="/#tickets"  className="hidden md:inline-flex items-center gap-1.5 bg-[#0A0A0A] text-white px-5 py-2.5 text-sm font-semibold rounded-full hover:bg-[#E05A1A] transition-all duration-300">
              Register <Icon name="arrow" size={12}/>
            </a>
            <button onClick={() => setMenuOpen(true)} className="md:hidden flex items-center justify-center w-10 h-10 text-[#0A0A0A]">
              <Icon name="menu" size={22} strokeWidth={2}/>
            </button>
          </div>
        </div>
      </nav>

      {/* HERO */}
      <section className="pt-32 lg:pt-40 pb-12 px-5 lg:px-10">
        <div className="max-w-7xl mx-auto">
          <div className="max-w-2xl animate-fadeUp">
            <div className="flex items-center gap-2 mb-6">
              <div className="w-8 h-px bg-[#E05A1A]"></div>
              <span className="text-[10px] sm:text-xs font-bold tracking-[0.25em] uppercase text-[#E05A1A]">TFCN 2026</span>
            </div>
            <h1 className="text-5xl sm:text-6xl lg:text-7xl font-bold tracking-[-0.05em] leading-[0.9] mb-6">
              Get Your<br/><span className="serif italic font-normal text-[#E05A1A]">Attending DP</span>
            </h1>
            <p className="text-base sm:text-lg text-[#0A0A0A]/65 leading-relaxed max-w-lg">
              Upload your photo, enter your name, and download your personalised TFCN 2026 attending graphic. Share it everywhere.
            </p>
          </div>
        </div>
      </section>

      {/* MAIN TOOL */}
      <section className="pb-24 px-5 lg:px-10">
        <div className="max-w-7xl mx-auto">
          <div className="grid lg:grid-cols-2 gap-10 lg:gap-20 items-start">

            {/* ── LEFT: Controls ── */}
            <div className="space-y-8 animate-fadeUp" style={{ animationDelay: '0.1s', opacity: 0, animationFillMode: 'forwards' }}>

              {/* STEP 1 */}
              <div>
                <div className="flex items-center gap-3 mb-5">
                  <div className={`step-num w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white ${photo ? 'bg-[#E05A1A]' : 'bg-[#0A0A0A]'}`}>
                    {photo ? <Icon name="check" size={14} strokeWidth={3}/> : '1'}
                  </div>
                  <span className="font-bold text-lg tracking-tight">Upload Your Photo</span>
                </div>

                {!photo ? (
                  <div
                    className={`upload-zone border-2 border-dashed border-[#0A0A0A]/20 rounded-xl p-10 text-center cursor-pointer bg-white/60 ${dragOver ? 'drag-over' : ''}`}
                    onClick={() => fileInputRef.current?.click()}
                    onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
                    onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                    onDragLeave={() => setDragOver(false)}
                  >
                    <div className="w-14 h-14 bg-[#0A0A0A]/5 rounded-full flex items-center justify-center mx-auto mb-4">
                      <Icon name="upload" size={24} className="text-[#0A0A0A]/40"/>
                    </div>
                    <p className="font-semibold text-[#0A0A0A]/80 mb-1">Click to upload your photo or drag and drop</p>
                    <p className="text-sm text-[#0A0A0A]/40">JPG or PNG</p>
                  </div>
                ) : (
                  <div className="flex items-center gap-4 p-4 bg-white rounded-xl border border-[#0A0A0A]/10">
                    <div className="w-14 h-14 rounded-full overflow-hidden flex-shrink-0 border-2 border-[#E05A1A]/20">
                      <img src={photo.src} alt="Your photo" className="w-full h-full object-cover"/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm text-[#0A0A0A]">Photo ready</p>
                      {!isTouch && <p className="text-xs text-[#0A0A0A]/40 mt-0.5">Auto-fitted · drag the preview to adjust if needed</p>}
                    </div>
                    <button
                      onClick={() => { setPhoto(null); setPhotoOffset({ x:0, y:0 }); if (fileInputRef.current) fileInputRef.current.value = ''; }}
                      className="flex-shrink-0 text-xs font-bold text-[#0A0A0A]/40 hover:text-[#E05A1A] transition-colors px-2 py-1">
                      Change
                    </button>
                  </div>
                )}
                <input
                  ref={fileInputRef}
                  type="file"
                  accept="image/jpeg,image/png"
                  className="hidden"
                  onChange={(e) => handleFile(e.target.files[0])}
                />
              </div>

              {/* STEP 2 */}
              <div>
                <div className="flex items-center gap-3 mb-5">
                  <div className={`step-num w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white ${name.trim() ? 'bg-[#E05A1A]' : 'bg-[#0A0A0A]'}`}>
                    {name.trim() ? <Icon name="check" size={14} strokeWidth={3}/> : '2'}
                  </div>
                  <span className="font-bold text-lg tracking-tight">Enter Your Name</span>
                </div>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => { setName(e.target.value.slice(0, 30)); setDownloaded(false); }}
                  placeholder="Enter your name"
                  maxLength={30}
                  className="w-full px-5 py-4 text-base font-semibold border-2 border-[#0A0A0A]/15 focus:border-[#E05A1A] outline-none bg-white rounded-xl transition-colors duration-300 text-[#0A0A0A] placeholder-[#0A0A0A]/30"
                />
                <div className="flex justify-between items-center mt-2.5 px-1">
                  <p className="text-xs text-[#0A0A0A]/40">Appears on the graphic in all caps</p>
                  <p className="text-xs text-[#0A0A0A]/30 font-medium tabular-nums">{name.length}/30</p>
                </div>
              </div>

              {/* STEP 3 */}
              <div>
                <div className="flex items-center gap-3 mb-5">
                  <div className={`step-num w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white ${canDownload ? 'bg-[#E05A1A]' : 'bg-[#0A0A0A]/20'}`}>
                    3
                  </div>
                  <span className="font-bold text-lg tracking-tight">Download</span>
                </div>

                <button
                  onClick={handleDownload}
                  disabled={!canDownload}
                  className={`w-full py-4 px-8 text-sm font-bold tracking-[0.08em] uppercase rounded-full transition-all duration-300 flex items-center justify-center gap-3 ${canDownload ? 'bg-[#E05A1A] text-white hover:bg-[#0A0A0A] cursor-pointer shadow-lg shadow-[#E05A1A]/20' : 'bg-[#0A0A0A]/10 text-[#0A0A0A]/30 cursor-not-allowed'}`}
                >
                  <Icon name="down" size={16}/>
                  Download Your DP
                </button>

                {!canDownload && (
                  <p className="text-xs text-[#0A0A0A]/35 text-center mt-3">
                    {!photo && !name ? 'Upload a photo and enter your name to continue' : !photo ? 'Upload a photo to continue' : 'Enter your name to continue'}
                  </p>
                )}
              </div>

              {/* SHARE BUTTONS (post-download) */}
              {downloaded && (
                <div className="pt-6 border-t border-[#0A0A0A]/10 space-y-3 animate-slide-in">
                  <p className="text-xs font-bold tracking-[0.2em] uppercase text-[#0A0A0A]/40 pb-1">Share Your DP</p>

                  <a
                    href={`https://wa.me/?text=${shareTextWA}`}
                    target="_blank" rel="noopener noreferrer"
                    className="flex items-center justify-center gap-3 w-full py-3.5 px-6 bg-[#25D366] text-white text-sm font-semibold rounded-full hover:opacity-90 transition-opacity"
                  >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    Share on WhatsApp
                  </a>

                  <a
                    href={`https://twitter.com/intent/tweet?text=${shareTextX}`}
                    target="_blank" rel="noopener noreferrer"
                    className="flex items-center justify-center gap-3 w-full py-3.5 px-6 bg-[#0A0A0A] text-white text-sm font-semibold rounded-full hover:bg-[#E05A1A] transition-colors duration-300"
                  >
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    Share on X
                  </a>

                  <button
                    onClick={copyForInstagram}
                    className="flex items-center justify-center gap-3 w-full py-3.5 px-6 text-white text-sm font-semibold rounded-full hover:opacity-90 transition-opacity"
                    style={{ background: 'linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%)' }}
                  >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                    Share on Instagram
                  </button>

                  <button
                    onClick={() => setDownloaded(false)}
                    className="w-full py-3.5 px-6 border-2 border-[#0A0A0A]/15 text-[#0A0A0A]/60 text-sm font-semibold rounded-full hover:border-[#E05A1A] hover:text-[#E05A1A] transition-all duration-300"
                  >
                    Adjust and Download Again
                  </button>
                </div>
              )}
            </div>

            {/* ── RIGHT: Canvas Preview ── */}
            <div className="lg:sticky lg:top-28 animate-fadeUp" style={{ animationDelay: '0.2s', opacity: 0, animationFillMode: 'forwards' }}>
              <p className="text-xs font-bold tracking-[0.2em] uppercase text-[#0A0A0A]/35 mb-4">Live Preview</p>

              <div
                className="relative rounded-2xl overflow-hidden shadow-2xl bg-[#0A0A0A]/5"
                style={{ cursor: photo && !isTouch ? (isDragging ? 'grabbing' : 'grab') : 'default' }}
                onMouseDown={onCanvasMouseDown}
                onMouseMove={onCanvasMouseMove}
                onMouseUp={onCanvasMouseUp}
                onMouseLeave={onCanvasMouseUp}
              >
                <canvas
                  ref={canvasRef}
                  width={CS}
                  height={CS}
                  className="w-full block"
                />

                {!templateImg && (
                  <div className="absolute inset-0 flex items-center justify-center bg-[#F5F2EE]">
                    <div className="text-center">
                      <div className="w-10 h-10 border-2 border-[#E05A1A] border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                      <p className="text-sm text-[#0A0A0A]/40 font-medium">Loading template...</p>
                    </div>
                  </div>
                )}

                {templateImg && !photo && (
                  <div className="absolute inset-0 flex items-end justify-center pb-8 pointer-events-none">
                    <div className="bg-[#0A0A0A]/70 text-white text-xs font-semibold px-5 py-2.5 rounded-full backdrop-blur-sm">
                      Upload a photo to see your preview
                    </div>
                  </div>
                )}

                {templateImg && photo && !name && (
                  <div className="absolute top-4 inset-x-4 flex justify-center pointer-events-none">
                    <div className="bg-[#0A0A0A]/70 text-white text-xs font-semibold px-5 py-2.5 rounded-full backdrop-blur-sm">
                      Enter your name above
                    </div>
                  </div>
                )}
              </div>

              {photo && !isTouch && (
                <p className="text-xs text-[#0A0A0A]/35 text-center mt-3">
                  Drag on the preview to reposition your photo
                </p>
              )}

              {canDownload && (
                <button
                  onClick={handleDownload}
                  className="mt-5 w-full py-4 bg-[#E05A1A] text-white text-sm font-bold tracking-[0.08em] uppercase rounded-full hover:bg-[#0A0A0A] transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-[#E05A1A]/20"
                >
                  <Icon name="down" size={16}/>
                  Download Your DP
                </button>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* HOW IT WORKS strip */}
      <section className="py-16 lg:py-20 px-5 lg:px-10 bg-[#0A0A0A] text-white">
        <div className="max-w-7xl mx-auto">
          <div className="grid md:grid-cols-3 gap-8 lg:gap-12">
            {[
              { n: '01', title: 'Upload your photo', body: 'JPG or PNG. Any size works — we handle the cropping to fit perfectly inside the frame.' },
              { n: '02', title: 'Enter your name',   body: 'Your name appears on the graphic in bold capitals. Reposition your photo by dragging on the preview.' },
              { n: '03', title: 'Download and share', body: 'Get a crisp 1080x1080 PNG. Share to WhatsApp, X, or copy directly for your Instagram story.' },
            ].map((s, i) => (
              <div key={i} className="flex gap-5 items-start">
                <div className="text-3xl font-bold text-[#E05A1A] serif italic font-normal flex-shrink-0">{s.n}</div>
                <div>
                  <h3 className="font-bold text-base text-white mb-2">{s.title}</h3>
                  <p className="text-sm text-white/50 leading-relaxed">{s.body}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="bg-[#0A0A0A] text-white pt-16 lg:pt-20 pb-10 px-5 lg:px-10 border-t border-white/10">
        <div className="max-w-7xl mx-auto">
          <div className="grid lg:grid-cols-12 gap-10 mb-12">
            <div className="lg:col-span-6">
              <div className="flex items-center gap-3 mb-6 text-white">
                <Logo size={40}/>
                <div>
                  <div className="text-base font-bold tracking-tight">The <span className="text-[#E05A1A]">Finance</span> Cycle Network</div>
                  <div className="text-xs text-white/40 mt-0.5">Edition 3.0 · 2026</div>
                </div>
              </div>
              <p className="text-sm text-white/50 max-w-md leading-relaxed">Africa's most curated finance gathering. Built for operators who read cycles before the crowd notices.</p>
            </div>
            <div className="lg:col-span-3">
              <div className="text-xs font-bold tracking-[0.2em] uppercase text-[#E05A1A] mb-4">Event</div>
              <ul className="space-y-3 text-sm text-white/60">
                <li>TFCN 2026: The Old Taker</li>
                <li>23 July 2026</li>
                <li>Lagos, Nigeria</li>
                <li>Convener: Sir K.C Onyekachi</li>
              </ul>
            </div>
            <div className="lg:col-span-3">
              <div className="text-xs font-bold tracking-[0.2em] uppercase text-[#E05A1A] mb-4">Connect</div>
              <ul className="space-y-3 text-sm text-white/60">
                <li><a href="https://www.instagram.com/thefinancecyclenetwork" target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">Instagram</a></li>
                <li><a href="https://x.com/thefinancecycle" target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors">Twitter / X</a></li>
                <li><a href="#" className="hover:text-white transition-colors">LinkedIn</a></li>
                <li><a href="mailto:hello@thefinancecyclenetwork.com" className="hover:text-white transition-colors">hello@thefinancecyclenetwork.com</a></li>
              </ul>
            </div>
          </div>
          <div className="pt-7 border-t border-white/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
            <p className="text-xs text-white/40 tracking-wider">© 2026 The Finance Cycle Network. All rights reserved.</p>
            <p className="text-xs text-white/40 tracking-[0.15em] uppercase">Designed for the old taker in all of us</p>
          </div>
        </div>
      </footer>

      {/* TOAST */}
      {toast && (
        <div className="toast-anim fixed bottom-6 left-1/2 z-[99999] w-[90vw] max-w-sm pointer-events-none"
          style={{ transform: 'translateX(-50%)' }}>
          <div className="bg-[#0A0A0A] text-white px-6 py-4 rounded-2xl text-sm font-semibold shadow-2xl text-center leading-snug">
            {toast}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
