  @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

function Icon({ name, size = 16, className = '', strokeWidth = 2 }) {
  const i = {
    arrow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>,
    x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
    arrowLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  };
  return i[name] || null;
}

function Logo({ size = 32 }) {
  return <img src="tfcn-logo.svg" width={size} height={size} alt="TFCN Logo" style={{ flexShrink: 0, objectFit: 'contain', display: 'block' }}/>;

function MobileMenu({ onClose }) {

  useEffect(() => { document.body.style.overflow = 'hidden'; return () => { document.body.style.overflow = ''; }; }, []);
  return (
    <div className="menu-slide fixed inset-0 z-50 bg-[#0A0A0A] flex flex-col">
      <div className="flex items-center justify-between px-5 py-5 border-b border-white/10">
        <a href="index.html" className="text-white flex items-center gap-2.5"><Logo size={28}/></a>
        <button onClick={onClose} className="w-10 h-10 flex items-center justify-center text-white/70 hover:text-white transition-colors"><Icon name="x" size={22} strokeWidth={2}/></button>
      </div>
      <nav className="flex-1 px-6 py-8 flex flex-col justify-center space-y-1">
        {links.map(([href, label], i) => (
          <a key={i} href={href} onClick={onClose} className="menu-link-in block text-4xl sm:text-5xl font-bold text-white/50 hover:text-white py-4 border-b border-white/10 transition-colors duration-300" style={{ animationDelay: `${0.05 + i * 0.07}s` }}>{label}</a>
        ))}
      </nav>
      <div className="px-6 pb-10 menu-link-in" style={{ animationDelay: '0.42s' }}>
        <a href="https://app.eventpadi.com/thefinancecyclenetwork" target="_blank" rel="noopener noreferrer" className="block w-full text-center bg-[#E05A1A] text-white py-4 font-semibold rounded-full hover:bg-white hover:text-[#0A0A0A] transition-all duration-300 mb-4">Secure Your Seat</a>
        <p className="text-center text-[10px] font-bold tracking-[0.25em] uppercase text-white/25">Edition 3.0 · Lagos · 23 July 2026</p>
      </div>
    </div>
  );
}

function TiltCard({ children, className, style, ...props }) {
  const ref = useRef(null);
  const handleMove = (e) => {
    const el = ref.current; const rect = el.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;
    el.style.transform = `perspective(900px) rotateX(${-y * 5}deg) rotateY(${x * 5}deg) translateY(-6px)`;
    el.style.boxShadow = `${-x * 24}px ${-y * 24}px 48px rgba(0,0,0,0.1)`;
  };
  const handleLeave = (e) => { const el = e.currentTarget; el.style.transform = ''; el.style.boxShadow = ''; };
  return <div ref={ref} className={className} style={{ transition: 'transform 0.35s ease, box-shadow 0.35s ease', ...style }} onMouseMove={handleMove} onMouseLeave={handleLeave} {...props}>{children}</div>;
}

const articles = [
  { title: "Why Africa's Wealthiest Operators Think in Cycles", tag: 'Wealth Cycles', excerpt: "Markets move in cycles. What separates those who build lasting wealth from those who reset to zero is not luck. It is the ability to read the room before everyone else does.", readTime: '5 min read', bg: '#0A0A0A', stripe: 'rgba(224,90,26,0.18)', textCol: '#ffffff', arrowBg: '#E05A1A', slug: 'blog-cycles.html' },
  { title: 'The Old Taker: Understanding the 2026 Theme', tag: '2026 Theme', excerpt: "The Old Taker is not a failure. That's the important distinction. They had it: real money, real assets, real momentum. And then the cycle turned, and they didn't move.", readTime: '4 min read', bg: '#E05A1A', stripe: 'rgba(0,0,0,0.13)', textCol: '#ffffff', arrowBg: '#0A0A0A', slug: 'blog-old-taker.html' },
  { title: 'Behind TFCN: The Vision of Sir K.C Onyekachi', tag: 'Convener', excerpt: "Africa doesn't have a shortage of financial events. It has a shortage of honest ones. This is why TFCN exists.", readTime: '4 min read', bg: '#F0EDE8', stripe: 'rgba(224,90,26,0.13)', textCol: '#0A0A0A', arrowBg: '#0A0A0A', slug: 'blog-behind-tfcn.html' },
];

function App() {

  useEffect(() => { const fn = () => setScrolled(window.scrollY > 20); window.addEventListener('scroll', fn); return () => window.removeEventListener('scroll', fn); }, []);
  useEffect(() => {
    const obs = new IntersectionObserver((es) => es.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in-view'); obs.unobserve(e.target); } }), { threshold: 0.1, rootMargin: '0px 0px -80px 0px' });
    setTimeout(() => document.querySelectorAll('.scroll-reveal').forEach((el) => obs.observe(el)), 100);
    return () => obs.disconnect();
  }, []);

  return (
    <div className="min-h-screen bg-[#F5F2EE] text-[#0A0A0A] grain">
      {menuOpen && <MobileMenu onClose={() => setMenuOpen(false)} />}

        <div className="max-w-7xl mx-auto px-5 lg:px-10 flex items-center justify-between">
          <a href="index.html" className="flex items-center gap-2.5 text-[#0A0A0A]">
            <Logo size={30}/>
            <span className="text-[13px] font-bold tracking-tight hidden sm:block">The <span className="text-[#E05A1A]">Finance</span> Cycle Network</span>
          </a>
          <div className="flex items-center gap-1">
            <a href="index.html#about" className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">About</a>
            <a href="index.html#host" className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">Convener</a>
            <a href="index.html#tickets" className="nav-link hidden md:block text-sm font-medium text-[#0A0A0A]/60 hover:text-[#0A0A0A] px-4 py-2 transition">Tickets</a>
            <a href="blog.html" className="nav-link hidden md:block text-sm font-semibold text-[#E05A1A] px-4 py-2 transition">Blog</a>
            <a href="https://app.eventpadi.com/thefinancecyclenetwork" target="_blank" rel="noopener noreferrer" className="hidden md:inline-flex items-center gap-1.5 bg-[#0A0A0A] text-white px-5 py-2.5 text-sm font-semibold rounded-full hover:bg-[#E05A1A] transition-all duration-300">Register <Icon name="arrow" size={12}/></a>
            <button onClick={() => setMenuOpen(true)} className="md:hidden flex items-center justify-center w-10 h-10 text-[#0A0A0A]"><Icon name="menu" size={22} strokeWidth={2}/></button>
          </div>
        </div>
      </nav>

      {/* HERO */}
      <section className="relative pt-36 pb-20 lg:pt-48 lg:pb-28 px-5 lg:px-10 overflow-hidden">
        <div className="absolute inset-0 opacity-[0.04]" style={{ backgroundImage: 'linear-gradient(#0A0A0A 1px, transparent 1px), linear-gradient(90deg, #0A0A0A 1px, transparent 1px)', backgroundSize: '60px 60px' }}/>
        <div className="absolute top-20 right-10 w-16 h-16 lg:w-28 lg:h-28 bg-[#E05A1A] opacity-90 animate-float"/>
        <div className="max-w-7xl mx-auto relative">
          <div className="animate-fadeUp flex items-center gap-2 mb-8">
            <div className="w-8 h-px bg-[#E05A1A]"></div>
            <span className="text-[10px] sm:text-xs font-bold tracking-[0.25em] uppercase text-[#E05A1A]">From the Desk</span>
          </div>
          <h1 className="animate-fadeUp delay-100 font-bold tracking-[-0.05em] leading-[0.9] text-[#0A0A0A] mb-8" style={{ fontSize: 'clamp(48px, 9vw, 110px)' }}>
            The TFCN <span className="serif italic font-normal text-[#E05A1A]">Blog.</span>
          </h1>
          <p className="animate-fadeUp delay-200 text-base sm:text-lg lg:text-xl text-[#0A0A0A]/60 max-w-xl leading-relaxed">Sharp thinking on finance, cycles, and wealth. From the team behind Africa's most curated gathering.</p>
        </div>
      </section>

      {/* ARTICLES */}
      <section className="pb-24 lg:pb-32 px-5 lg:px-10">
        <div className="max-w-7xl mx-auto">
          <div className="grid md:grid-cols-3 gap-6 scroll-reveal">
            {articles.map((post, i) => (
              <TiltCard key={i} className="group cursor-pointer">
                <a href={post.slug} className="block">
                  <div className="relative rounded-2xl overflow-hidden mb-5" style={{ aspectRatio: '4/3', background: post.bg, backgroundImage: `repeating-linear-gradient(-48deg, transparent, transparent 22px, ${post.stripe} 22px, ${post.stripe} 44px)` }}>

          <a href="https://app.eventpadi.com/thefinancecyclenetwork" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-[#E05A1A] text-white px-8 py-4 text-sm font-bold tracking-[0.1em] uppercase rounded-full hover:bg-white hover:text-[#0A0A0A] transition-all duration-300">Secure Your Seat <Icon name="arrow" size={14}/></a>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="bg-[#0A0A0A] text-white pt-16 pb-10 px-5 lg:px-10 border-t border-white/10">
        <div className="max-w-7xl mx-auto">
          <div className="grid lg:grid-cols-12 gap-10 mb-12">
            <div className="lg:col-span-6">
              <div className="flex items-center gap-3 mb-6 text-white"><Logo size={40}/><div><div className="text-base font-bold tracking-tight">The <span className="text-[#E05A1A]">Finance</span> Cycle Network</div><div className="text-xs text-white/40 mt-0.5">Edition 3.0 · 2026</div></div></div>
              <p className="text-sm text-white/50 max-w-md leading-relaxed">Africa's most curated finance gathering. Built for operators who read cycles before the crowd notices.</p>
            </div>
            <div className="lg:col-span-3">
              <div className="text-xs font-bold tracking-[0.2em] uppercase text-[#E05A1A] mb-4">Event</div>
              <ul className="space-y-3 text-sm text-white/60"><li>TFCN 2026: The Old Taker</li><li>23 July 2026</li><li>Lagos, Nigeria</li><li>Convener: Sir K.C Onyekachi</li></ul>
            </div>
            <div className="lg:col-span-3">
              <div className="text-xs font-bold tracking-[0.2em] uppercase text-[#E05A1A] mb-4">Connect</div>

                <li><a href="#" className="hover:text-white transition-colors">Twitter / X</a></li>
                <li><a href="#" className="hover:text-white transition-colors">LinkedIn</a></li>
                <li><a href="mailto:hello@tfcn.network" className="hover:text-white transition-colors">hello@tfcn.network</a></li>
              </ul>
            </div>
          </div>
          <div className="pt-7 border-t border-white/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">

            <p className="text-xs text-white/40 tracking-[0.15em] uppercase">Designed for the old taker in all of us</p>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
