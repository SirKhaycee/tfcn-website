              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              A Familiar Figure
            </h2>

            <p>The name is deliberate. An "old taker" is someone who used to take: used to be the one other people watched and studied, used to be the example pointed to in rooms like the ones TFCN convenes. The past tense is the entire point.</p>

            <p>They are not a failure in the traditional sense. They did not make one catastrophic mistake. They did not bet everything on a single venture and lose it all overnight. That story is too clean. The Old Taker's story is more gradual, and therefore more dangerous to ignore.</p>

            <p>What happened to them happened slowly, and then all at once.</p>

              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              How the Cycle Turns
            </h2>

            <p>Most Old Takers lose their position in the same way. They reach the high point of a wealth cycle and they mistake it for the new floor. They assume the conditions that produced their success are permanent conditions. They extrapolate the upward line indefinitely.</p>

            <p>Then the line bends.</p>

            <p>Real estate that seemed like a guaranteed store of value gets hit by currency devaluation and demand contraction at the same time. A business that dominated a sector for a decade faces disruption from a direction nobody predicted. A portfolio weighted heavily in local currency assets loses a third of its dollar value in eighteen months.</p>

            <p>The Old Taker is not destroyed by these events. They are worn down by a combination of them, while still believing they have time to recover.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              The Warning Signs Nobody Tells You
            </h2>

            <p>The first warning sign is comfort. When your current position feels safe, feels like it will hold regardless of what happens next, that is precisely when you need to stress test it.</p>

            <p>The second is isolation. Old Takers often stop attending the rooms where honest conversations happen. They surround themselves with people who affirm their current strategy rather than challenge it. They stop asking difficult questions because they assume they have already answered them.</p>

            <p>The third is momentum confusion. They confuse the momentum they built during the cycle with the momentum they actually have right now. These are different things. One is historical. One is the reality of today's market.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              What Separates the Survivors
            </h2>

            <p>The operators who pass through a cycle turn and come out positioned better than they entered share one consistent trait. They stayed in honest rooms.</p>

            <p>They kept showing up to conversations where other serious operators were willing to say: I was wrong about that. I lost money on that move. I missed that signal. Here is what I learned.</p>

            <p>These conversations do not happen at public conferences. They happen in private, among people with enough shared context and enough mutual respect to be direct. The willingness to be in those rooms, to be teachable even after you have already built something, is what separates the survivors from the Old Takers.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              Where This Conversation Belongs

            <p>TFCN 2026 is not a warning. It is not a cautionary tale dressed up as a gathering.</p>

            <p>It is an intervention for everyone who is currently building wealth and wants to make sure that what they are building holds through the next cycle turn. The theme this year is The Old Taker because the room deserves to look directly at the risk, not around it.</p>

            <p>Every person in that room on 23 July 2026 has the potential to become an Old Taker. The ones who will not are the ones who show up to this conversation seriously.</p>
