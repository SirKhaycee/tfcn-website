          <p className="text-xl sm:text-2xl font-medium leading-[1.75] text-[#0A0A0A] mb-10 pb-10" style={{ borderBottom: '1px solid rgba(10,10,10,0.1)', margin: 0, marginBottom: '2.5rem', paddingBottom: '2.5rem' }}>
            Africa doesn't have a shortage of financial events. It has a shortage of honest ones. This is why TFCN exists.
          </p>

          <div className="article-body">
            <p>There is a version of a financial event that most people are familiar with. A large venue. A program with impressive-sounding panels. Speakers who were big names three years ago. Networking sessions where everyone is selling something. Sponsors whose presence shapes the agenda in ways nobody officially acknowledges.</p>

            <p>That version of the event is not TFCN.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              The Problem with Most Financial Events
            </h2>

            <p>Sir K.C Onyekachi, the convener of The Finance Cycle Network, has attended enough of those events to know exactly what they are optimized for. Visibility. Optics. The appearance of insight.</p>

            <p>What they are not optimized for is the actual transfer of useful knowledge between serious operators. The conversations that change how people manage capital do not happen on a stage with five hundred people in the audience. They happen in hallways, at dinners, in the rooms adjacent to the main event.</p>

            <p>TFCN is an attempt to make the hallway the main event.</p>

            {/* Pullquote */}
            <div style={{ margin: '2.5rem 0', padding: '2rem 2.5rem', background: '#0A0A0A', borderRadius: '1rem' }}>
              <p style={{ fontFamily: 'Instrument Serif, serif', fontStyle: 'italic', fontSize: 'clamp(1.25rem, 2.5vw, 1.65rem)', lineHeight: 1.4, color: 'rgba(255,255,255,0.9)', margin: 0 }}>
                "I didn't want to create another event. I wanted to create a different kind of room."
              </p>
              <p style={{ fontFamily: 'Inter, sans-serif', fontSize: '0.75rem', fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(224,90,26,0.8)', marginTop: '1rem', marginBottom: 0 }}>Sir K.C Onyekachi</p>
            </div>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              Why Curation Is the Product
            </h2>

            <p>The most common question people ask about TFCN is: how do you get in?</p>

            <p>The answer is that attendance is curated. Not as a marketing mechanism, not to manufacture exclusivity, but because the quality of conversation in a room is entirely determined by who is in it. One person who is there to perform, to collect contacts, or to be seen, can shift the dynamic of a room in ways that take hours to recover from.</p>

            <p>TFCN accepts a small number of attendees precisely so that every person in the room is there for the same reason: to have honest conversations about wealth, cycles, and what it actually takes to hold what you build.</p>

            <p>This is a much harder gathering to produce than a standard conference. It requires real selectivity, real conviction about what the event is for, and the willingness to say no to the kinds of applications that would look impressive on paper but would dilute the room.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              What the First Two Editions Taught
            </h2>

            <p>The first edition of TFCN proved a hypothesis: that there was genuine demand in Africa for a gathering that did not perform intelligence, but actually exchanged it.</p>

            <p>The second edition refined the format. Fewer formal sessions. More structured conversations. A deliberate balance between people who are building right now and people who have already been through multiple cycles. That mix, of current operators and proven veterans, produces a specific kind of honesty that is hard to replicate anywhere else.</p>

            <p>By the third edition, the format is settled. What changes is the theme, and the theme is always a direct response to what is happening in the financial environment that the room is navigating.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              The Old Taker Theme
            </h2>

            <p>The decision to make 2026's theme "The Old Taker" was personal.</p>

            <p>Sir Khaycee has watched people he knows lose significant wealth in the past several years. Not because they were careless. Not because they made obviously bad decisions. Because they were operating from a framework that had stopped matching the cycle they were actually in.</p>

            <p>He has also watched people he knows hold through that same period and come out stronger, not because they were smarter, but because they stayed connected to honest conversations and adjusted when they needed to.</p>

            <p>The Old Taker theme is not about fear. It is about clarity. About naming a risk that is real and giving serious operators the framework to navigate it.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              An Invitation
            </h2>

            <p>TFCN 2026 is for people who are building wealth on the continent and want to make sure they are still building it five cycles from now.</p>

            <p>It is not for people who want to be seen at a finance event. It is not for people who are looking for investment pitches or sponsor relationships.</p>

            <p>It is for operators. People who are making real decisions with real capital, who want to be in a room with other people doing the same, having the kind of conversation that actually moves the needle.</p>

            <p>If that is you, the room is being filled now. Seats are limited, not as a sales line, but as a reflection of the gathering's design. The question is whether you will be in it.</p>
          </div>
