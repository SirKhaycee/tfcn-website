          {/* Lead paragraph */}
          <p className="text-xl sm:text-2xl font-medium leading-[1.75] text-[#0A0A0A] mb-10 pb-10 border-b border-[#0A0A0A]/10 article-body" style={{ margin: 0, marginBottom: '2.5rem', paddingBottom: '2.5rem', borderBottom: '1px solid rgba(10,10,10,0.1)' }}>
            Most people experience a financial cycle once in their lifetime and call it luck. The wealthy experience it three times and call it a system.
          </p>

          <div className="article-body">
            <p>There is a pattern to how wealth is built and lost across Africa. It is not random. It is not the result of exceptional intelligence or extraordinary fortune. It is, in almost every case, a function of whether someone understood the cycle they were in, and acted accordingly.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              Markets Always Return to the Mean
            </h2>

            <p>Every asset class in history has demonstrated one consistent behavior: it moves in cycles. Commodities boom and bust. Real estate appreciates and corrects. Currencies strengthen and weaken. Businesses grow, plateau, and either adapt or decline.</p>

            <p>In Africa, these cycles are compressed. What might take a decade to play out in more stable economies can unfold in three to four years on the continent. Naira devaluation cycles. Oil revenue peaks. Agricultural commodity swings. The compressive nature of African markets means the window for action is smaller, and the cost of being late is higher.</p>

            <p>The operators who have built durable wealth across Nigeria, Ghana, Kenya, and South Africa understand one thing above all: you do not build during the peak. You build during the contraction, when everyone else is retreating.</p>

            {/* Pullquote */}
            <div style={{ margin: '2.5rem 0', padding: '2rem 2.5rem', background: '#0A0A0A', borderRadius: '1rem' }}>
              <p style={{ fontFamily: 'Instrument Serif, serif', fontStyle: 'italic', fontSize: 'clamp(1.25rem, 2.5vw, 1.65rem)', lineHeight: 1.4, color: 'rgba(255,255,255,0.9)', margin: 0 }}>
                "You do not build during the peak. You build during the contraction, when everyone else is retreating."
              </p>
            </div>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              Cycle Thinking Is a Learnable Skill
            </h2>

            <p>Here is where most people get it wrong. They believe cycle awareness is an instinct, something you either have or you do not. It is not. It is a discipline, built through study, mentorship, and deliberate pattern recognition.</p>

            <p>The wealthy operators in Africa did not stumble into their positioning. They read the terrain. They studied what happened in the decade before them. They found rooms, private ones, where people who had already ridden a cycle were willing to share what they learned.</p>

            <p>This is not information that gets shared publicly. It is shared in specific contexts: boardrooms, closed dinners, curated gatherings where the admission criteria is seriousness, not status.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              The African Context Is Specific
            </h2>

            <p>You cannot apply a Wall Street framework to a Lagos boardroom and expect it to work. The African wealth cycle has its own logic.</p>

            <p>Currency risk is structural. In most African markets, naira, cedi, or kwacha exposure without a dollar or hard-asset hedge is not investing. It is speculation with a timer attached. The operators who survive multiple cycles know this. They do not just build wealth. They store it correctly.</p>

            <p>Political cycles intersect with financial ones. Government transitions in Africa often create sector volatility, regulatory shifts, and capital flow changes that have no direct equivalent in Western markets. Reading these cycles requires local knowledge, not imported theory.</p>

            <p>The demographic dividend is the longest cycle of all. Africa's growing middle class, urbanization rate, and youth population represent a generational wealth creation opportunity. But it will reward those who position early and hold through the noise, not those who chase short-term returns.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              How to Position Before the Turn
            </h2>

            <p>The single most important move in cycle thinking is acting before the consensus forms. By the time an opportunity becomes obvious, the margin has already compressed.</p>

            <p>This means making decisions that feel early, and sometimes uncomfortable. Buying when others are selling. Holding cash when others are deploying. Diversifying into asset classes that seem quiet precisely because the noise is somewhere else.</p>

            <p>It also means knowing your time horizon. Not every cycle rewards impatience. Some of the best positions in African real estate took seven years to pay off. The operators who captured those returns were the ones who could hold.</p>

            <h2 style={{ fontFamily: 'Inter, sans-serif', fontSize: '1.2rem', fontWeight: 700, marginTop: '2.8rem', marginBottom: '1.1rem', color: '#0A0A0A', display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
              <span style={{ width: '20px', height: '2px', background: '#E05A1A', flexShrink: 0 }}></span>
              What This Means for You
            </h2>

            <p>If you are reading this, you are probably not a passive observer of financial cycles. You are building something. You are making decisions that will compound, for better or worse, over the next five to ten years.</p>

            <p>The question is not whether the next cycle is coming. It is whether you are positioned to benefit from it, or whether you will be one of the people explaining, three years from now, what you used to have.</p>

            <p>That is the conversation TFCN 2026 is designed to host. Not theory. Not motivation. A room of operators who think in cycles, sharing what that has actually looked like in practice.</p>
