function TiltCard({ children, className, style, ...props }) {
  const ref = useRef(null);
  const handleMove = (e) => {
    const el = ref.current;
    const rect = el.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;
    el.style.transform = `perspective(900px) rotateX(${-y * 5}deg) rotateY(${x * 5}deg) translateY(-6px)`;
    el.style.boxShadow = `${-x * 24}px ${-y * 24}px 48px rgba(0,0,0,0.1)`;
    el.style.borderColor = '#E05A1A';
  };
  const handleLeave = (e) => {
    const el = e.currentTarget;
    el.style.transform = '';
    el.style.boxShadow = '';
    el.style.borderColor = '';
  };
  return (
    <div ref={ref} className={className} style={{ transition: 'transform 0.35s ease, box-shadow 0.35s ease, border-color 0.3s', ...style }} onMouseMove={handleMove} onMouseLeave={handleLeave} {...props}>
      {children}
    </div>
  );
}

function Countdown() {
  const target = new Date('2026-07-23T09:00:00');
  const [t, setT] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
  useEffect(() => {
    const tick = () => {
      const diff = target - new Date();
      if (diff <= 0) { setT({ days: 0, hours: 0, minutes: 0, seconds: 0 }); return; }
      setT({
        days: Math.floor(diff / 86400000),
        hours: Math.floor((diff / 3600000) % 24),
        minutes: Math.floor((diff / 60000) % 60),
        seconds: Math.floor((diff / 1000) % 60),
      });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  return (
    <div className="grid grid-cols-4 divide-x divide-white/10">
      {[{ l: 'Days', v: t.days }, { l: 'Hours', v: t.hours }, { l: 'Minutes', v: t.minutes }, { l: 'Seconds', v: t.seconds }].map((u, i) => (
        <div key={i} className="text-center py-6 lg:py-10">
          <div className="font-bold tracking-[-0.05em] text-white tabular-nums leading-none" style={{ fontSize: 'clamp(48px, 10vw, 140px)' }}>{String(u.v).padStart(2, '0')}</div>
          <div className="text-[9px] sm:text-[11px] font-bold tracking-[0.25em] uppercase text-[#E05A1A] mt-3">{u.l}</div>
        </div>
      ))}
    </div>
  );
}
