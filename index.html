<style>
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; margin: 0; background: #F5F2EE; }
  .serif { font-family: 'Instrument Serif', serif; }
  .grain::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4; mix-blend-mode: multiply;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes ticker-rev { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }
  .animate-fadeUp { animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
  .animate-float { animation: float 6s ease-in-out infinite; }
  .animate-pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
  .delay-100 { animation-delay: 0.1s; }
  .delay-200 { animation-delay: 0.2s; }
  .delay-300 { animation-delay: 0.3s; }
  .delay-500 { animation-delay: 0.5s; }
  .ticker { display: flex; animation: ticker 40s linear infinite; white-space: nowrap; }
  .scroll-reveal { opacity: 0; transform: translateY(60px); transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
  .scroll-reveal.in-view { opacity: 1; transform: translateY(0); }
  .hover-lift { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .hover-lift:hover { transform: translateY(-6px); }
  .magnetic-btn { position: relative; overflow: hidden; border-radius: 9999px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .magnetic-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: translateX(-100%); transition: transform 0.6s; }

<script type="text/babel" data-presets="react">

    mic: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 00-3 3v7a3 3 0 006 0V5a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>,
    handshake: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="17" r="3"/><circle cx="16" cy="17" r="3"/><path d="M5 14V8a2 2 0 012-2h10a2 2 0 012 2v6"/></svg>,
    target: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    book: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>,

    star: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    lock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
  };
  return i[name] || null;
}

function Logo({ size = 32 }) {
  return (
    <img src="tfcn-logo.svg" width={size} height={size} alt="TFCN Logo" style={{ flexShrink: 0, objectFit: 'contain', display: 'block' }}/>
  );
}

function Countdown() {
  const target = new Date('2026-07-23T09:00:00');
  const [t, setT] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
  useEffect(() => {
    const tick = () => {
      const diff = target - new Date();
      if (diff <= 0) { setT({ days: 0, hours: 0, minutes: 0, seconds: 0 }); return; }
      setT({
        days: Math.floor(diff / 86400000),
        hours: Math.floor((diff / 3600000) % 24),
        minutes: Math.floor((diff / 60000) % 60),
        seconds: Math.floor((diff / 1000) % 60),
      });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);
  return (
    <div className="grid grid-cols-4 gap-px bg-white/10">
      {[{ l: 'Days', v: t.days }, { l: 'Hours', v: t.hours }, { l: 'Minutes', v: t.minutes }, { l: 'Seconds', v: t.seconds }].map((u, i) => (
        <div key={i} className="bg-[#0A0A0A] p-3 sm:p-5 lg:p-6 text-center">
          <div className="text-2xl sm:text-4xl lg:text-5xl font-bold tracking-[-0.04em] text-white tabular-nums">{String(u.v).padStart(2, '0')}</div>
          <div className="text-[9px] sm:text-[10px] font-bold tracking-[0.2em] uppercase text-[#E05A1A] mt-1.5">{u.l}</div>
        </div>
      ))}
    </div>
  );
}

        <span className={`flex-shrink-0 w-8 h-8 border-2 border-[#0A0A0A] flex items-center justify-center transition-all duration-500 ${open ? 'bg-[#E05A1A] border-[#E05A1A] text-white rotate-180' : 'text-[#0A0A0A]'}`}>
          <Icon name={open ? 'check' : 'plus'} size={14} strokeWidth={2.5}/>
        </span>
      </button>
      <div className={`faq-content ${open ? 'open' : ''}`}>
        <p className="text-[#0A0A0A]/70 text-base leading-relaxed pb-6 pr-12">{a}</p>
      </div>
    </div>
  );
}

function Input({ label, value, onChange, placeholder, type = 'text', required = false }) {

        style={{ borderRadius: 0 }}/>
    </div>
  );
}

    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  useEffect(() => {
    const obs = new IntersectionObserver(
      (es) => es.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in-view'); obs.unobserve(e.target); } }),
      { threshold: 0.1, rootMargin: '0px 0px -80px 0px' }

  }, []);

  const faqs = [
    { q: 'What is TFCN 2026?', a: 'The Finance Cycle Network is a curated annual gathering bringing together Africa\'s sharpest financial minds, operators, and capital allocators. The 2026 edition is themed "The Old Taker", exploring the mindset of those who read cycles and take wealth before the crowd notices.' },
